<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Tools</title>
<script src="src/lib/ort.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 32px 16px; }
  .columns { flex: 1; }
  .columns { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
  .card { background: #fff; border-radius: 16px; box-shadow: 0 2px 24px rgba(0,0,0,.08); padding: 32px; width: 440px; }
  h1 { font-size: 20px; margin-bottom: 24px; text-align: center; color: #111; }
  .section-label { display: block; font-size: 12px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }

  .sizes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 24px; }
  .size-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px 4px; border: 2px solid #eee; border-radius: 10px; background: #fafafa; cursor: pointer; transition: all .15s; }
  .size-btn:hover { border-color: #ccc; background: #f0f0f0; }
  .size-btn.active { border-color: #111; background: #111; }
  .size-btn.active .size-label { color: #fff; }
  .size-btn.active .size-sub { color: rgba(255,255,255,.6); }
  .size-btn.active .size-icon rect { stroke: #fff; }
  .size-icon { width: 40px; height: 32px; display: flex; align-items: center; justify-content: center; }
  .size-icon rect { fill: none; stroke: #888; stroke-width: 1.5; rx: 1; }
  .size-label { font-size: 12px; font-weight: 600; color: #333; line-height: 1; }
  .size-sub { font-size: 10px; color: #aaa; line-height: 1; }

  .orient { display: flex; gap: 8px; margin-bottom: 24px; }
  .orient-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; border: 2px solid #eee; border-radius: 10px; background: #fafafa; cursor: pointer; transition: all .15s; font-size: 14px; font-weight: 500; color: #555; }
  .orient-btn:hover { border-color: #ccc; }
  .orient-btn.active { border-color: #111; background: #111; color: #fff; }
  .orient-btn.active svg rect { stroke: #fff; }
  .orient-btn svg rect { fill: none; stroke: #888; stroke-width: 1.5; rx: 1; transition: stroke .15s; }

  .custom-panel { margin-bottom: 24px; overflow: hidden; transition: max-height .3s ease, opacity .2s ease; max-height: 0; opacity: 0; }
  .custom-panel.visible { max-height: 200px; opacity: 1; }
  .slider-section { margin-bottom: 12px; }
  .manual-section { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .manual-section input[type=number] { width: 100%; padding: 9px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; text-align: center; background: #fafafa; outline: none; -moz-appearance: textfield; }
  .manual-section input[type=number]::-webkit-inner-spin-button,
  .manual-section input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .manual-section input[type=number]:focus { border-color: #111; }
  .manual-section .x-sep { font-size: 14px; color: #aaa; font-weight: 600; flex-shrink: 0; }
  .manual-section .px-label { font-size: 12px; color: #aaa; font-weight: 600; flex-shrink: 0; }
  .tab-row { display: flex; gap: 0; margin-bottom: 14px; }
  .tab-btn { flex: 1; padding: 8px; font-size: 12px; font-weight: 600; border: 1px solid #ddd; background: #fafafa; color: #888; cursor: pointer; transition: all .15s; }
  .tab-btn:first-child { border-radius: 6px 0 0 6px; }
  .tab-btn:last-child { border-radius: 0 6px 6px 0; }
  .tab-btn.active { background: #111; color: #fff; border-color: #111; }
  .slider-row { display: flex; align-items: center; gap: 12px; }
  .slider-row .ratio-icon { flex-shrink: 0; }
  .slider-row .ratio-icon rect { fill: none; stroke: #111; stroke-width: 1.5; rx: 1; }
  .slider-row input[type=range] { flex: 1; -webkit-appearance: none; appearance: none; height: 6px; border-radius: 3px; background: #e0e0e0; outline: none; }
  .slider-row input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #111; cursor: grab; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.25); }
  .slider-row input[type=range]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: #111; cursor: grab; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.25); }
  .slider-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 10px; color: #aaa; font-weight: 600; }
  .slider-ratio { text-align: center; font-size: 13px; font-weight: 600; color: #555; margin-top: 8px; }

  .dims { text-align: center; font-size: 15px; color: #888; margin-bottom: 16px; }
  .preview-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
  .preview { border: 1px solid #ddd; background: #fff; transition: all .2s; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row button { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .download { background: #111; color: #fff; }
  .download:hover { background: #333; }
  .copy { background: #f0f0f0; color: #333; }
  .copy:hover { background: #e0e0e0; }
  .copy.copied { background: #22c55e; color: #fff; }
  footer { text-align: center; padding: 20px 0 12px; font-size: 13px; color: #aaa; margin-top: auto; }
  footer .heart { display: inline; color: #e25555; }

  /* Watermark Remover */
  .wm-drop { border: 2px dashed #ddd; border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all .2s; background: #fafafa; margin-bottom: 20px; }
  .wm-drop:hover, .wm-drop.dragover { border-color: #111; background: #f5f5f5; }
  .wm-drop-icon { font-size: 32px; margin-bottom: 8px; }
  .wm-drop-text { font-size: 14px; color: #666; }
  .wm-drop-sub { font-size: 12px; color: #aaa; margin-top: 4px; }
  .wm-drop input[type=file] { display: none; }
  .wm-progress { display: none; margin-bottom: 16px; }
  .wm-progress-bar-wrap { height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
  .wm-progress-bar { height: 100%; background: #111; border-radius: 3px; width: 0%; transition: width .3s; }
  .wm-progress-text { font-size: 12px; color: #888; text-align: center; }
  .wm-log { display: none; background: #f8f8f8; border-radius: 8px; padding: 10px 12px; margin-bottom: 16px; max-height: 120px; overflow-y: auto; font-size: 11px; font-family: monospace; color: #666; }
  .wm-log .log-line { margin-bottom: 2px; }
  .wm-log .log-time { color: #aaa; }
  .wm-log .log-error { color: #e25555; }
  .wm-result { display: none; }
  .wm-result h2 { font-size: 15px; color: #333; margin-bottom: 12px; text-align: center; }
  .wm-preview { text-align: center; margin-bottom: 16px; }
  .wm-preview img { max-width: 100%; max-height: 300px; border-radius: 8px; border: 1px solid #ddd; }
  .wm-note { text-align: center; font-size: 11px; color: #aaa; margin-top: 12px; }
</style>
</head>
<body>
<div class="columns">
<div class="card">
  <h1>White PNG Generator</h1>

  <span class="section-label">Size</span>
  <div class="sizes" id="sizes"></div>

  <div class="custom-panel" id="custom-panel">
    <div class="tab-row">
      <button class="tab-btn active" id="tab-slider">Ratio Slider</button>
      <button class="tab-btn" id="tab-manual">Enter Resolution</button>
    </div>
    <div id="slider-section" class="slider-section">
      <div class="slider-row">
        <svg class="ratio-icon" id="ratio-icon" width="40" height="28" viewBox="0 0 40 28"><rect id="ratio-rect" x="1" y="1" width="38" height="26"/></svg>
        <input type="range" id="ratio-slider" min="100" max="400" value="178">
      </div>
      <div class="slider-labels"><span>1 : 1</span><span>4 : 1</span></div>
      <div class="slider-ratio" id="slider-ratio-label"></div>
    </div>
    <div id="manual-section" class="manual-section" style="display:none">
      <input type="number" id="input-w" min="1" max="16384" value="1920" placeholder="Width">
      <span class="x-sep">&times;</span>
      <input type="number" id="input-h" min="1" max="16384" value="1080" placeholder="Height">
      <span class="px-label">px</span>
    </div>
  </div>

  <span class="section-label">Orientation</span>
  <div class="orient">
    <button class="orient-btn active" id="btn-landscape">
      <svg width="28" height="20" viewBox="0 0 28 20"><rect x="1" y="1" width="26" height="18"/></svg>
      Landscape
    </button>
    <button class="orient-btn" id="btn-portrait">
      <svg width="18" height="24" viewBox="0 0 18 24"><rect x="1" y="1" width="16" height="22"/></svg>
      Portrait
    </button>
  </div>

  <div class="dims" id="dims"></div>
  <div class="preview-wrap"><div class="preview" id="preview"></div></div>

  <div class="btn-row">
    <button class="download" id="download">Download</button>
    <button class="copy" id="copy">Copy Image</button>
  </div>
</div>

<div class="card">
  <h1>Gemini Watermark Remover</h1>

  <div class="wm-drop" id="wm-drop">
    <div class="wm-drop-icon">&#128194;</div>
    <div class="wm-drop-text">Drop your image here<br><span class="wm-drop-sub">or click to browse (PNG, JPEG, WebP)</span></div>
    <input type="file" id="wm-file" accept="image/png,image/jpeg,image/webp">
  </div>

  <div class="wm-progress" id="wm-progress">
    <div class="wm-progress-bar-wrap"><div class="wm-progress-bar" id="wm-bar"></div></div>
    <div class="wm-progress-text" id="wm-ptext">0%</div>
  </div>

  <div class="wm-log" id="wm-log"></div>

  <div class="wm-result" id="wm-result">
    <h2>Cleaned Image</h2>
    <div class="wm-preview"><img id="wm-img" alt="Processed"></div>
    <div class="btn-row">
      <a class="download" id="wm-dl" download style="text-align:center;text-decoration:none;display:block">Download</a>
      <button class="copy" id="wm-reset">Process Another</button>
    </div>
    <div class="wm-note">Processed locally in your browser. No data sent to any server.<br>Based on <a href="https://github.com/dinoBOLT/Gemini-Watermark-Remover" target="_blank" rel="noopener" style="color:#999">dinoBOLT/Gemini-Watermark-Remover</a></div>
  </div>
</div>
</div>
<footer>Made with <span class="heart">&#9829;</span> by Spiris</footer>

<script>
  const PRESETS = [
    { label: '4:3',    sub: '1600x1200', w: 1600, h: 1200, iw: 28, ih: 21 },
    { label: '16:9',   sub: '1920x1080', w: 1920, h: 1080, iw: 32, ih: 18 },
    { label: '21:9',   sub: '2560x1080', w: 2560, h: 1080, iw: 36, ih: 15 },
    { label: '1:1',    sub: '2048x2048', w: 2048, h: 2048, iw: 24, ih: 24 },
    { label: 'A4',     sub: '2480x3508', w: 2480, h: 3508, iw: 20, ih: 28 },
    { label: 'A3',     sub: '3508x4961', w: 3508, h: 4961, iw: 20, ih: 28 },
    { label: 'Letter', sub: '2550x3300', w: 2550, h: 3300, iw: 22, ih: 28 },
  ];
  const CUSTOM_IDX = PRESETS.length;
  const BASE_SHORT = 1440;

  const sizesEl = document.getElementById('sizes');
  const dimsEl = document.getElementById('dims');
  const previewEl = document.getElementById('preview');
  const btnL = document.getElementById('btn-landscape');
  const btnP = document.getElementById('btn-portrait');
  const dlBtn = document.getElementById('download');
  const copyBtn = document.getElementById('copy');
  const customPanel = document.getElementById('custom-panel');
  const sliderSection = document.getElementById('slider-section');
  const manualSection = document.getElementById('manual-section');
  const tabSlider = document.getElementById('tab-slider');
  const tabManual = document.getElementById('tab-manual');
  const ratioSlider = document.getElementById('ratio-slider');
  const ratioRect = document.getElementById('ratio-rect');
  const ratioIcon = document.getElementById('ratio-icon');
  const sliderLabel = document.getElementById('slider-ratio-label');
  const inputW = document.getElementById('input-w');
  const inputH = document.getElementById('input-h');
  let selected = 1;
  let portrait = false;
  let customTab = 'slider';

  function buildSizeButtons() {
    sizesEl.innerHTML = '';
    PRESETS.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = 'size-btn' + (i === selected ? ' active' : '');
      const svgW = 40, svgH = 32;
      const rx = (svgW - s.iw) / 2, ry = (svgH - s.ih) / 2;
      btn.innerHTML = `
        <svg class="size-icon" width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}">
          <rect x="${rx}" y="${ry}" width="${s.iw}" height="${s.ih}"/>
        </svg>
        <span class="size-label">${s.label}</span>
        <span class="size-sub">${s.sub}</span>`;
      btn.onclick = () => { selected = i; updateAll(); };
      sizesEl.appendChild(btn);
    });
    const cbtn = document.createElement('button');
    cbtn.className = 'size-btn' + (selected === CUSTOM_IDX ? ' active' : '');
    cbtn.innerHTML = `
      <svg class="size-icon" width="40" height="32" viewBox="0 0 40 32">
        <rect x="6" y="8" width="28" height="16" stroke-dasharray="3 2"/>
      </svg>
      <span class="size-label">Custom</span>
      <span class="size-sub">slider</span>`;
    cbtn.onclick = () => { selected = CUSTOM_IDX; updateAll(); };
    sizesEl.appendChild(cbtn);
  }

  function getCustomRatio() {
    return ratioSlider.value / 100;
  }

  function getCustomWH() {
    const r = getCustomRatio();
    return [Math.round(BASE_SHORT * r), BASE_SHORT];
  }

  function updateSliderIcon() {
    const r = getCustomRatio();
    const maxW = 38, maxH = 26;
    let rw, rh;
    if (r >= 1) {
      rw = maxW; rh = Math.round(maxW / r);
      if (rh < 8) rh = 8;
    } else {
      rh = maxH; rw = Math.round(maxH * r);
      if (rw < 8) rw = 8;
    }
    const rx = (40 - rw) / 2, ry = (28 - rh) / 2;
    ratioRect.setAttribute('x', rx);
    ratioRect.setAttribute('y', ry);
    ratioRect.setAttribute('width', rw);
    ratioRect.setAttribute('height', rh);
    const n = r >= 1 ? r : 1 / r;
    const nice = Math.round(n * 10) / 10;
    if (Math.abs(r - 1) < 0.02) sliderLabel.textContent = '1 : 1';
    else if (r >= 1) sliderLabel.textContent = `${nice} : 1`;
    else sliderLabel.textContent = `1 : ${nice}`;
  }

  function getManualWH() {
    const w = Math.max(1, Math.min(16384, parseInt(inputW.value) || 1));
    const h = Math.max(1, Math.min(16384, parseInt(inputH.value) || 1));
    return [w, h];
  }

  function getWH() {
    if (selected === CUSTOM_IDX) {
      if (customTab === 'manual') {
        let [w, h] = getManualWH();
        if (portrait && w > h) [w, h] = [h, w];
        if (!portrait && h > w) [w, h] = [h, w];
        return [w, h];
      }
      let [w, h] = getCustomWH();
      if (portrait && w > h) [w, h] = [h, w];
      if (!portrait && h > w) [w, h] = [h, w];
      return [w, h];
    }
    const s = PRESETS[selected];
    let w = s.w, h = s.h;
    if (portrait && w > h) [w, h] = [h, w];
    if (!portrait && h > w) [w, h] = [h, w];
    return [w, h];
  }

  function setCustomTab(tab) {
    customTab = tab;
    tabSlider.classList.toggle('active', tab === 'slider');
    tabManual.classList.toggle('active', tab === 'manual');
    sliderSection.style.display = tab === 'slider' ? '' : 'none';
    manualSection.style.display = tab === 'manual' ? '' : 'none';
    updateAll();
  }

  tabSlider.onclick = () => setCustomTab('slider');
  tabManual.onclick = () => setCustomTab('manual');
  inputW.addEventListener('input', updateAll);
  inputH.addEventListener('input', updateAll);

  function updateAll() {
    buildSizeButtons();
    customPanel.classList.toggle('visible', selected === CUSTOM_IDX);
    if (selected === CUSTOM_IDX && customTab === 'slider') updateSliderIcon();
    const [w, h] = getWH();
    dimsEl.innerHTML = `${w} &times; ${h} px`;
    const maxW = 376, maxH = 140;
    const scale = Math.min(maxW / w, maxH / h);
    previewEl.style.width = Math.round(w * scale) + 'px';
    previewEl.style.height = Math.round(h * scale) + 'px';
  }

  ratioSlider.addEventListener('input', updateAll);

  btnL.onclick = () => { portrait = false; btnL.classList.add('active'); btnP.classList.remove('active'); updateAll(); };
  btnP.onclick = () => { portrait = true; btnP.classList.add('active'); btnL.classList.remove('active'); updateAll(); };

  function makeBlob(cb) {
    const [w, h] = getWH();
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);
    c.toBlob(cb, 'image/png');
  }

  dlBtn.onclick = () => {
    makeBlob(blob => {
      const [w, h] = getWH();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `white-${w}x${h}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  };

  copyBtn.onclick = () => {
    makeBlob(blob => {
      navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(() => {
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.textContent = 'Copy Image'; copyBtn.classList.remove('copied'); }, 1500);
      });
    });
  };

  updateAll();
</script>

<script>
(function() {
  const MODEL_PATH = 'https://api.github.com/repos/Spiris-Innovation-Tech-Dev/gemini-tools/releases/assets/394129220';
  const INPUT_SIZE = 512;
  const WM_HEIGHT_RATIO = 0.15;
  const WM_WIDTH_RATIO = 0.15;
  const WM_EXTENDED_RATIO = 0.16;
  const MAX_FILE_SIZE = 50 * 1024 * 1024;
  const ALLOWED = ['image/png','image/jpeg','image/jpg','image/webp'];

  const dropZone = document.getElementById('wm-drop');
  const fileInput = document.getElementById('wm-file');
  const progressEl = document.getElementById('wm-progress');
  const barEl = document.getElementById('wm-bar');
  const ptextEl = document.getElementById('wm-ptext');
  const logEl = document.getElementById('wm-log');
  const resultEl = document.getElementById('wm-result');
  const imgEl = document.getElementById('wm-img');
  const dlEl = document.getElementById('wm-dl');
  const resetEl = document.getElementById('wm-reset');

  let session = null;
  let modelBuffer = null;

  function log(msg, level) {
    logEl.style.display = 'block';
    const t = new Date().toLocaleTimeString();
    const line = document.createElement('div');
    line.className = 'log-line' + (level === 'error' ? ' log-error' : '');
    line.innerHTML = '<span class="log-time">[' + t + ']</span> ' + msg;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function setProgress(pct, msg) {
    progressEl.style.display = 'block';
    barEl.style.width = pct + '%';
    ptextEl.textContent = pct + '% - ' + msg;
    log(msg);
  }

  function formatSize(b) {
    if (b === 0) return '0 B';
    const k = 1024, s = ['B','KB','MB','GB'];
    const i = Math.floor(Math.log(b) / Math.log(k));
    return Math.round(b / Math.pow(k, i) * 100) / 100 + ' ' + s[i];
  }

  function wmRegion(w, h, ratio) {
    const rw = Math.floor(w * (ratio || WM_WIDTH_RATIO));
    const rh = Math.floor(h * (ratio || WM_HEIGHT_RATIO));
    return { x: w - rw, y: h - rh, width: rw, height: rh };
  }

  async function fetchModel(onProgress) {
    const res = await fetch(MODEL_PATH, { headers: { 'Accept': 'application/octet-stream' } });
    if (!res.ok) throw new Error('Failed to fetch model');
    const len = parseInt(res.headers.get('Content-Length') || '0', 10);
    const reader = res.body.getReader();
    let received = 0;
    const chunks = [];
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;
      if (len > 0 && onProgress) onProgress(Math.round(received / len * 100), received);
    }
    const buf = new Uint8Array(received);
    let pos = 0;
    for (const c of chunks) { buf.set(c, pos); pos += c.length; }
    return buf;
  }

  async function initModel() {
    ort.env.wasm.wasmPaths = 'src/lib/';
    ort.env.wasm.numThreads = 1;
    ort.env.wasm.proxy = false;
    if (!modelBuffer) {
      modelBuffer = await fetchModel((pct, bytes) => {
        const p = 10 + Math.round(pct * 0.3);
        setProgress(p, 'Downloading model (' + formatSize(bytes) + ')...');
      });
    }
    setProgress(45, 'Initializing neural engine...');
    session = await ort.InferenceSession.create(modelBuffer, {
      executionProviders: ['wasm'],
      graphOptimizationLevel: 'basic'
    });
    setProgress(50, 'Model ready');
  }

  function preprocess(imageData) {
    const { width, height, data } = imageData;
    const f = new Float32Array(3 * width * height);
    for (let i = 0; i < width * height; i++) {
      f[i] = data[i * 4] / 255;
      f[width * height + i] = data[i * 4 + 1] / 255;
      f[2 * width * height + i] = data[i * 4 + 2] / 255;
    }
    const imgT = new ort.Tensor('float32', f, [1, 3, height, width]);
    const m = new Float32Array(width * height);
    const r = wmRegion(width, height);
    for (let y = 0; y < height; y++)
      for (let x = 0; x < width; x++)
        m[y * width + x] = (y >= r.y && x >= r.x) ? 1 : 0;
    const maskT = new ort.Tensor('float32', m, [1, 1, height, width]);
    return { image: imgT, mask: maskT };
  }

  function postprocess(tensor, w, h) {
    const d = tensor.data;
    const rgba = new Uint8ClampedArray(w * h * 4);
    let max = 0;
    for (let i = 0; i < Math.min(1000, d.length / 3); i++) max = Math.max(max, Math.abs(d[i]));
    const norm = max <= 2;
    for (let i = 0; i < w * h; i++) {
      let r = d[i], g = d[w * h + i], b = d[2 * w * h + i];
      if (norm) { r *= 255; g *= 255; b *= 255; }
      rgba[i * 4] = Math.min(255, Math.max(0, Math.round(r)));
      rgba[i * 4 + 1] = Math.min(255, Math.max(0, Math.round(g)));
      rgba[i * 4 + 2] = Math.min(255, Math.max(0, Math.round(b)));
      rgba[i * 4 + 3] = 255;
    }
    return new ImageData(rgba, w, h);
  }

  function compose(bitmap, processed) {
    const ow = bitmap.width, oh = bitmap.height;
    const fc = document.createElement('canvas');
    fc.width = ow; fc.height = oh;
    const fctx = fc.getContext('2d');
    fctx.drawImage(bitmap, 0, 0);
    const tc = document.createElement('canvas');
    tc.width = INPUT_SIZE; tc.height = INPUT_SIZE;
    tc.getContext('2d').putImageData(processed, 0, 0);
    const or = wmRegion(ow, oh, WM_EXTENDED_RATIO);
    const pr = wmRegion(INPUT_SIZE, INPUT_SIZE, WM_EXTENDED_RATIO);
    fctx.drawImage(tc, pr.x, pr.y, pr.width, pr.height, or.x, or.y, or.width, or.height);
    return fc.toDataURL('image/png', 1);
  }

  async function processFile(file) {
    if (!ALLOWED.includes(file.type)) { log('Invalid file type', 'error'); return; }
    if (file.size > MAX_FILE_SIZE) { log('File too large (max 50 MB)', 'error'); return; }

    dropZone.style.display = 'none';
    resultEl.style.display = 'none';
    log('File: ' + file.name + ' (' + formatSize(file.size) + ')');
    setProgress(5, 'Loading image...');

    const bitmap = await createImageBitmap(file);
    log('Image: ' + bitmap.width + 'x' + bitmap.height + 'px');

    setProgress(10, 'Checking AI model...');
    if (!session) await initModel();

    setProgress(60, 'Preparing image...');
    const rc = document.createElement('canvas');
    rc.width = INPUT_SIZE; rc.height = INPUT_SIZE;
    rc.getContext('2d').drawImage(bitmap, 0, 0, INPUT_SIZE, INPUT_SIZE);
    const resized = rc.getContext('2d').getImageData(0, 0, INPUT_SIZE, INPUT_SIZE);
    const feeds = preprocess(resized);
    log('Preprocessed to ' + INPUT_SIZE + 'x' + INPUT_SIZE + 'px');

    setProgress(70, 'Removing watermark with AI...');
    await new Promise(r => setTimeout(r, 100));
    const results = await session.run(feeds);
    const outKey = Object.keys(results)[0];
    log('AI processing complete');

    setProgress(90, 'Composing final image...');
    const processed = postprocess(results[outKey], INPUT_SIZE, INPUT_SIZE);
    const dataUrl = compose(bitmap, processed);
    log('Final image composed at original resolution');

    setProgress(100, 'Complete!');
    imgEl.src = dataUrl;
    dlEl.href = dataUrl;
    dlEl.download = 'gemini-clean-' + Date.now() + '.png';
    setTimeout(() => {
      progressEl.style.display = 'none';
      resultEl.style.display = 'block';
    }, 400);
  }

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', () => { if (fileInput.files.length) processFile(fileInput.files[0]); });

  resetEl.addEventListener('click', () => {
    resultEl.style.display = 'none';
    dropZone.style.display = '';
    progressEl.style.display = 'none';
    logEl.innerHTML = '';
    logEl.style.display = 'none';
    fileInput.value = '';
    log('Ready for new image');
  });
})();
</script>
